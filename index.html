function hrlFromTotal(t){
  for(const r of HRL_TABLE){if(t>=r.min&&t<=r.max)return r;}
  if(t<HRL_TABLE[0].min)return HRL_TABLE[0];
  if(t>HRL_TABLE[HRL_TABLE.length-1].max)return HRL_TABLE[HRL_TABLE.length-1];
  let cl=HRL_TABLE[0],cd=Infinity;
  for(const r of HRL_TABLE){const d=t<r.min?r.min-t:t>r.max?t-r.max:0;if(d<cd){cd=d;cl=r;}}
  return cl;
}

  kh_row:{A:"Basic numeracy, literacy and knowledge of simple instructions and routines generally acquired through a short explanation. Unskilled work.",B:"Knowledge of standardised work routines and methods, general facts and information and/or use of simple equipment. Acquired through on-the-job training.",C:"Knowledge for application of practical methods, techniques, work procedures and processes. Typically acquired through some specialised training.",D:"Broad or specialised knowledge of methods, techniques and processes with some theoretical background. Advanced specialised training or broad practical experience.",E:"Sufficient knowledge in a technical, scientific or specialised field built on understanding of theoretical concepts and principles. Professional or academic qualification or extensive practical experience.",F:"Broad and/or deep knowledge requiring command of diverse practices and precedents and/or sophisticated concepts. Very deep and/or broad experience typically combined with academic/professional qualification.",G:"Diverse, cumulative knowledge and/or fundamental understanding of concepts, principles and practices. Comprehensive business experience or very deep development in a highly specialised field.",H:"Pre-eminent knowledge and command of principles, theories and applications in a scientific field or other learned discipline. Normally associated with ongoing ground-breaking work."},
  kh_col:{T:"Task focused — performance of highly specific tasks with limited awareness of surrounding circumstances. Little or no planning or organising.",I:"Specific — performance or supervision of multiple activities. Requires interacting with co-workers and maintaining awareness of related activities.",II:"Related — integration of operations or services generally related in nature. Requires co-ordination with associated functions.",III:"Diverse — operational or conceptual integration of functions diverse in nature and objective, or critical to overall business goals.",IV:"Broad — strategic integration and leadership of important business operations, or direction of a strategic function across the organisation."},
  kh_comm:{1:"Communicate — dealing with others primarily to request and provide information. Courtesy, tact and effectiveness are required.",2:"Reason — interaction requires understanding, influencing and supporting people through applying technical knowledge or rational arguments to cause action or acceptance by others.",3:"Change behaviour — interaction is primarily concerned with influencing, developing and motivating people and changing behaviour. Often involves inspiration and creating the right working climate."},
  ps_row:{A:"Strict routine — thinking within very detailed and precisely defined rules and instructions and/or continually present assistance. Action steps are defined.",B:"Routine — thinking within detailed standard practices and instructions and/or immediately available assistance. Most action steps are defined.",C:"Semi-routine — thinking within well-defined, somewhat diversified procedures with many precedents covering most situations.",D:"Standardised — thinking within multiple, substantially different procedures, standards and precedents. Many problems can be tackled from experience.",E:"Clearly defined — thinking within clearly defined policies, principles and specific objectives. The 'what' is defined but the 'how' is determined by the jobholder's own judgment.",F:"Broadly defined — thinking within broadly defined policies and objectives. Problem areas are not clearly defined; policies formulated within broad functional guidelines.",G:"Generally defined — thinking within general policies, principles and goals. Jobs which develop total organisation guidelines, market strategy and product concepts.",H:"Abstractly defined — thinking within general laws of nature and science, business philosophy and cultural values. Sets the strategic direction of the organisation."},
  ps_col:{1:"Repetitive — identical situations requiring solution by simple choice of things learned. Thinking is confined to selection from a few known solutions.",2:"Patterned — similar situations requiring solution by discriminating choice between known alternatives. Selection of solution is learned by experience.",3:"Variable — differing situations requiring identification of issues, application of judgment, and selection of solutions within the area of expertise and acquired knowledge.",4:"Adaptive — situations constantly requiring adaptation or development of new solutions through analytical, interpretative, evaluative, creative and innovative thinking.",5:"Uncharted — novel and path-finding situations requiring development of new concepts and imaginative solutions for which there are no precedents."},
  acc_row:{A:"Closely controlled — operating within direct and detailed instructions with very close and continuous supervision. No deviation permitted without permission.",B:"Controlled — subject to instructions and established work routines, under close supervision. Some latitude to rearrange task sequence.",C:"Standardised — operating within standardised practices and procedures, general work instructions and supervision of progress and results.",D:"Generally regulated — operating within practices and procedures covered by precedents or well-defined policies and review of end results.",E:"Clearly directed — subject to broad practices and procedures covered by functional precedents, policies and managerial direction. Independence needed to achieve annual results.",F:"Generally directed — subject to general direction and broadly defined policy objectives. Determines and sets annual objectives for others.",G:"Guided — subject only to overall guidance on broad organisational objectives and orientation of strategic policy. Establishes long-term strategic goals.",H:"Strategically guided — by reason of organisational size and complexity, subject only to very broad guidance and general orientation in response to business trends."},
  acc_mag:{N:"Non-quantified — the major job effect is on results where the focus is on consistency, quality and accuracy, regardless of which part of the organisation the job operates in.",1:"Very small — major job effect on results that are only a very small proportion of the organisation's objectives. Very small service or project team.",2:"Small — major job effect on results that are a small proportion of the organisation's objectives. Small service or project team.",3:"Medium — major job effect on results representing a medium-sized proportion of overall objectives. Medium department, function or project.",4:"Large — major job effect on results of a large element of the organisation critical to achievement of one or more key objectives."},
  acc_impact:{R:"Remote — provision of information, record keeping or incidental services for use by others. Essentially acts after the event; cannot impact the action already taken.",C:"Contributory — interpretative, advisory or facilitating services for use by others to achieve results. Significant advice and counsel that influences decisions.",S:"Shared — joint or shared control with another/others for end results (except own subordinates and superiors). Implies partnership or joint accountability.",P:"Prime — controlling impact on end results at a level of freedom to act. Sole controlling impact; exercises direct control over resources used."},
  acc_nq:{I:"Ancillary — provision of incidental service for use of others (e.g. simple filing, delivering mail).",II:"Supportive — provision of support services usually of an informational or recording nature within a department, or operation/simple maintenance of secondary or support equipment.",III:"Operational — operation of processes/equipment directly related to the core value chain, or provision of support services of a facilitating/interpretive nature across several departments.",IV:"Analytical — provision of specialised services usually of an analytical, diagnostic and advisory nature, or operation/maintenance of critical, highly complex equipment or systems core to the business.",V:"Guiding — leads identifiable areas of activity such as employee teams or projects within well-defined parameters, or provides advice and guidance within an area of expertise at the framework/policy development level.",VI:"Effecting — delivers results from operations comprised of multiple related teams performing diverse activities, or ensures effective delivery of strategic programs, or leads provision of functional policies and frameworks that enable organisational performance."},

const COMM_LABELS={1:"1 – Communicate",2:"2 – Reason",3:"3 – Change behaviour"};
const PS_ROW_LABELS={A:"A – Strict routine",B:"B – Routine",C:"C – Semi-routine",D:"D – Standardised",E:"E – Clearly defined",F:"F – Broadly defined",G:"G – Generally defined",H:"H – Abstractly defined"};
const PS_COL_LABELS={1:"1 – Repetitive",2:"2 – Patterned",3:"3 – Variable",4:"4 – Adaptive",5:"5 – Uncharted"};
const ACC_ROW_LABELS={A:"A – Closely controlled",B:"B – Controlled",C:"C – Standardised",D:"D – Generally regulated",E:"E – Clearly directed",F:"F – Generally directed",G:"G – Guided",H:"H – Strategically guided"};
const IMPACT_LABELS={R:"R – Remote",C:"C – Contributory",S:"S – Shared",P:"P – Prime"};
const MAG_LABELS={N:"N – Non-quantified",1:"1 – Very small",2:"2 – Small",3:"3 – Medium",4:"4 – Large"};
const NQ_LABELS={I:"I – Ancillary",II:"II – Supportive",III:"III – Operational",IV:"IV – Analytical",V:"V – Guiding",VI:"VI – Effecting"};

function Btn({label,active,onClick,large}){
  return(
    <button onClick={onClick} style={{padding:large?"8px 20px":"6px 12px",fontSize:large?"18px":"16px",fontWeight:active?"700":(large?"600":"400"),borderRadius:"6px",cursor:"pointer",border:active?"1.5px solid var(--color-border-info)":"0.5px solid var(--color-border-tertiary)",background:active?"var(--color-background-info)":"var(--color-background-secondary)",color:active?"var(--color-text-info)":"var(--color-text-secondary)",transition:"all 0.12s"}}>
      {label}
    </button>
  );
}

function BtnGroup({items,selected,onSelect,labels}){
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
      {items.map(k=>(
        <Btn key={k} label={labels?labels[k]:String(k)} active={selected===k} onClick={()=>onSelect(selected===k?null:k)}/>
      ))}
    </div>
  );
}

function InlineDesc({text}){
  if(!text)return null;
  return <p style={{fontSize:"15px",color:"#7a5c00",marginTop:"8px",lineHeight:"1.6",background:"#fff8e1",padding:"8px 12px",borderRadius:"6px",border:"0.5px solid #ffe082"}}>ℹ {text}</p>;
}

function ModifierBtns({value,onChange}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
      <span style={{fontSize:"16px",color:"#555"}}>Modifier:</span>
      <Btn label="− (lower)" active={value===-1} onClick={()=>onChange(-1)}/>
      <Btn label="Standard"  active={value===0}  onClick={()=>onChange(0)}/>
      <Btn label="+ (upper)" active={value===1}  onClick={()=>onChange(1)}/>
    </div>
  );
}

function ScoreBox({label,value}){
  return(
    <div style={{background:"#fff",borderRadius:"10px",padding:"14px",border:"1px solid #5DC1F2"}}>
      <div style={{fontSize:"14px",color:"#555",marginBottom:"4px"}}>{label}</div>
      <div style={{fontSize:"26px",fontWeight:"700",color:"#5DC1F2"}}>{value!=null?value:"–"}</div>
    </div>
  );
}

const card={background:"#fff",border:"0.5px solid #dde3ea",borderRadius:"12px",padding:"1.75rem 2rem",marginBottom:"1rem"};
const lbl={fontSize:"17px",fontWeight:"500",color:"#1a1a2e",display:"block",marginBottom:"8px"};
const hdr={fontSize:"20px",fontWeight:"700",marginBottom:"12px",color:"#5DC1F2"};

function App(){
  const [step,setStep]=useState(0);
  const [jobTitle,setJobTitle]=useState("");
  const [khRow,setKhRow]=useState(null);
  const [khCol,setKhCol]=useState(null);
  const [khComm,setKhComm]=useState(null);
  const [khMod,setKhMod]=useState(0);
  const [psRow,setPsRow]=useState(null);
  const [psCol,setPsCol]=useState(null);
  const [psMod,setPsMod]=useState(0);
  const [accRow,setAccRow]=useState(null);
  const [accImpact,setAccImpact]=useState(null);
  const [accMag,setAccMag]=useState(null);
  const [accNq,setAccNq]=useState(null);
  const [accMod,setAccMod]=useState(0);

  const khCell=(khRow&&khCol&&khComm)?(KH_TABLE[khRow]?.[khCol]?.[khComm]??null):null;
  const khPts=useMemo(()=>{if(!khCell)return null;if(khMod===-1)return khCell[0];if(khMod===1)return khCell[2];return khCell[1];},[khCell,khMod]);
  const psCell=(psRow&&psCol)?(PS_TABLE[psRow]?.[psCol]??null):null;
  const psPct=useMemo(()=>{if(!psCell)return null;if(psMod===1)return psCell[1];return psCell[0];},[psCell,psMod]);
  const psPts=(khPts&&psPct)?(PS_RR[psPct]?.[khPts]??Math.floor(khPts*psPct/100)):null;
  const accCell=useMemo(()=>{if(!accRow)return null;if(accMag==="N"){if(!accNq)return null;return ACC_NQ_TABLE[accRow]?.[accNq]??null;}if(!accMag||!accImpact)return null;return ACC_TABLE[accRow]?.[accMag]?.[accImpact]??null;},[accRow,accMag,accImpact,accNq]);
  const accPts=useMemo(()=>{if(!accCell)return null;if(accMod===-1)return accCell[0];if(accMod===1)return accCell[2];return accCell[1];},[accCell,accMod]);
  const total=(khPts&&psPts&&accPts)?khPts+psPts+accPts:null;
  const hrl=total?hrlFromTotal(total):null;
  const shortProfile=useMemo(()=>{if(!psPts||!accPts)return null;if(accPts===psPts)return"L";const d=stepDiff(psPts,accPts);const dir=accPts>psPts?"A":"P";return d==null?dir:`${dir}${d}`;},[psPts,accPts]);

  const canNext={0:true,1:true,2:!!(khRow&&khCol&&khComm),3:!!(psRow&&psCol),4:!!(accRow&&accImpact&&accMag&&(accMag==="N"?accNq:true))};

  function resetAll(){setStep(0);setJobTitle("");setKhRow(null);setKhCol(null);setKhComm(null);setKhMod(0);setPsRow(null);setPsCol(null);setPsMod(0);setAccRow(null);setAccImpact(null);setAccMag(null);setAccNq(null);setAccMod(0);}

  const STEPS=["Intro","Job info","Know-How","Problem Solving","Accountability","Results"];

  function Nav({idx}){
    const ok=canNext[idx];
    return(
      <div style={{display:"flex",justifyContent:"space-between",marginTop:"1.25rem"}}>
        {idx>1?<Btn label="← Back" onClick={()=>setStep(idx-1)} large/>:<span/>}
        {idx<5&&<Btn label={idx===4?"See results →":"Next →"} active={ok} large onClick={()=>{if(ok)setStep(idx+1);}}/>}
      </div>
    );
  }

  return(
    <div style={{padding:"1rem",maxWidth:"960px",margin:"0 auto",width:"100%"}}>

      {step>0&&(
        <div style={{marginBottom:"1rem"}}>
          <div style={{display:"flex",gap:"6px",marginBottom:"8px"}}>
            {STEPS.slice(1).map((s,i0)=>{
              const i=i0+1;
              return(
                <div key={i} onClick={()=>{if(i<step)setStep(i);}} style={{flex:1,textAlign:"center",fontSize:"13px",fontWeight:"500",padding:"5px 2px",borderRadius:"6px",cursor:i<step?"pointer":"default",background:i===step?"#e8f4fd":i<step?"#e8f5e9":"#f0f4f8",color:i===step?"#5DC1F2":i<step?"#2e7d32":"#888",border:`0.5px solid ${i===step?"#5DC1F2":i<step?"#a5d6a7":"#dde3ea"}`}}>
                  {s}
                </div>
              );
            })}
          </div>
          <div style={{height:"3px",background:"#dde3ea",borderRadius:"2px"}}>
            <div style={{height:"3px",background:"#5DC1F2",borderRadius:"2px",width:`${((step-1)/4)*100}%`,transition:"width 0.3s"}}/>
          </div>
        </div>
      )}

      {step===0&&(
        <div style={{minHeight:"580px",borderRadius:"16px",background:"linear-gradient(180deg,#1d6b63 0%,#14524c 60%,#0d3b3e 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"4rem 3rem"}}>
          <div style={{fontSize:"26px",fontWeight:"800",color:"#fff",letterSpacing:"0.4px",marginBottom:"22px",lineHeight:"1.3"}}>Job Evaluation</div>
          <div style={{fontSize:"22px",fontWeight:"600",color:"#d7efe9",marginBottom:"22px",lineHeight:"1.35"}}>Owned by Korn Ferry – HAY Methodology</div>
          <div style={{fontSize:"20px",fontWeight:"500",color:"#aee0d4",marginBottom:"6px"}}>Designed by</div>
          <div style={{fontSize:"20px",fontWeight:"700",color:"#fff",marginBottom:"20px"}}>Mohamed Abdo</div>
          <a href="https://www.linkedin.com/in/mohamed-abdo-mba-phri-8b3a13a6/" target="_blank" rel="noopener noreferrer"
            style={{display:"inline-block",fontSize:"16px",fontWeight:"700",color:"#0d3b3e",background:"#5DC1F2",padding:"10px 22px",borderRadius:"8px",textDecoration:"none",marginBottom:"36px"}}>
            🔗 LinkedIn Profile
          </a>
          <button onClick={()=>setStep(1)} style={{fontSize:"26px",fontWeight:"800",color:"#1d6b63",background:"#fff",border:"none",borderRadius:"10px",padding:"14px 36px",cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.18)"}}>
            Start Evaluation →
          </button>
        </div>
      )}

      {step===1&&(
        <div style={card}>
          <p style={hdr}>Job Information</p>
          <label style={lbl}>Job title (optional)</label>
          <input value={jobTitle} onChange={e=>setJobTitle(e.target.value)} placeholder="e.g. HR Specialist"/>
          <p style={{fontSize:"16px",color:"#555",lineHeight:"1.6",marginTop:"10px"}}>Evaluate the job as it is — not the person in it. Disregard current pay or status. Select any option to see its full definition inline.</p>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:"1rem"}}>
            <Btn label="Next →" active onClick={()=>setStep(2)} large/>
          </div>
        </div>
      )}

      {step===2&&(
        <div style={card}>
          <p style={hdr}>Know-How — what knowledge and skills does the job require?</p>
          <label style={lbl}>1a. Practical / technical knowledge</label>
          <BtnGroup items={["A","B","C","D","E","F","G","H"]} selected={khRow} onSelect={v=>{setKhRow(v);setKhMod(0);}} labels={KH_ROW_LABELS}/>
          <InlineDesc text={khRow?DESC.kh_row[khRow]:null}/>
          <div style={{marginTop:"16px"}}>
            <label style={lbl}>1b. Planning, organising & integrating (managerial) knowledge</label>
            <BtnGroup items={["T","I","II","III","IV"]} selected={khCol} onSelect={v=>{setKhCol(v);setKhMod(0);}} labels={KH_COL_LABELS}/>
            <InlineDesc text={khCol?DESC.kh_col[khCol]:null}/>
          </div>
          <div style={{marginTop:"16px"}}>
            <label style={lbl}>1c. Communicating & influencing skills</label>
            <BtnGroup items={[1,2,3]} selected={khComm} onSelect={v=>{setKhComm(v);setKhMod(0);}} labels={COMM_LABELS}/>
            <InlineDesc text={khComm?DESC.kh_comm[khComm]:null}/>
          </div>
          {khRow&&khCol&&khComm&&(
            <div style={{marginTop:"16px",padding:"12px 14px",background:"#f0f4f8",borderRadius:"8px"}}>
              <p style={{fontSize:"14px",color:"#888",marginBottom:"10px"}}>Cell values [lower / standard / upper]: <strong>{khCell?khCell.join(" / "):"–"}</strong></p>
              <ModifierBtns value={khMod} onChange={setKhMod}/>
              <p style={{fontSize:"17px",fontWeight:"700",color:"#5DC1F2",marginTop:"10px"}}>Know-How points: {khPts}</p>
            </div>
          )}
          <Nav idx={2}/>
        </div>
      )}

      {step===3&&(
        <div style={card}>
          <p style={hdr}>Problem Solving — what thinking does the job demand?</p>
          {khPts&&<p style={{fontSize:"16px",color:"#555",marginBottom:"10px"}}>Know-How: <strong>{khPts} pts</strong> — PS is a % of Know-How.</p>}
          <label style={lbl}>2a. Thinking environment (freedom to think)</label>
          <BtnGroup items={["A","B","C","D","E","F","G","H"]} selected={psRow} onSelect={v=>{setPsRow(v);setPsMod(0);}} labels={PS_ROW_LABELS}/>
          <InlineDesc text={psRow?DESC.ps_row[psRow]:null}/>
          <div style={{marginTop:"16px"}}>
            <label style={lbl}>2b. Thinking challenge (complexity of problems)</label>
            <BtnGroup items={[1,2,3,4,5]} selected={psCol} onSelect={v=>{setPsCol(v);setPsMod(0);}} labels={PS_COL_LABELS}/>
            <InlineDesc text={psCol?DESC.ps_col[psCol]:null}/>
          </div>
          {psRow&&psCol&&(
            <div style={{marginTop:"16px",padding:"12px 14px",background:"#f0f4f8",borderRadius:"8px"}}>
              <p style={{fontSize:"14px",color:"#888",marginBottom:"10px"}}>Cell values [lower / upper]: <strong>{psCell?psCell.join(" / "):"–"}%</strong></p>
              <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                <span style={{fontSize:"16px",color:"#555"}}>Modifier:</span>
                <Btn label="Standard" active={psMod===0} onClick={()=>setPsMod(0)}/>
                <Btn label="+ (upper)" active={psMod===1} onClick={()=>setPsMod(1)}/>
              </div>
              <p style={{fontSize:"17px",fontWeight:"700",color:"#5DC1F2",marginTop:"10px"}}>{psPct}% × {khPts} = {psPts} PS points</p>
            </div>
          )}
          <Nav idx={3}/>
        </div>
      )}

      {step===4&&(
        <div style={card}>
          <p style={hdr}>Accountability — what impact does the job have on end results?</p>
          <label style={lbl}>3a. Freedom to act</label>
          <BtnGroup items={["A","B","C","D","E","F","G","H"]} selected={accRow} onSelect={v=>{setAccRow(v);setAccMod(0);}} labels={ACC_ROW_LABELS}/>
          <InlineDesc text={accRow?DESC.acc_row[accRow]:null}/>
          <div style={{marginTop:"16px"}}>
            <label style={lbl}>3b. Nature of impact</label>
            <BtnGroup items={["R","C","S","P"]} selected={accImpact} onSelect={v=>{setAccImpact(v);setAccMod(0);}} labels={IMPACT_LABELS}/>
            <InlineDesc text={accImpact?DESC.acc_impact[accImpact]:null}/>
          </div>
          <div style={{marginTop:"16px"}}>
            <label style={lbl}>3c. Magnitude (area of impact)</label>
            <BtnGroup items={["N","1","2","3","4"]} selected={accMag} onSelect={v=>{setAccMag(v);setAccNq(null);setAccMod(0);}} labels={MAG_LABELS}/>
            <InlineDesc text={accMag?DESC.acc_mag[accMag]:null}/>
          </div>
          {accMag==="N"&&(
            <div style={{marginTop:"16px"}}>
              <label style={lbl}>3d. Non-quantified magnitude — area of impact (select I–VI)</label>
              <BtnGroup items={["I","II","III","IV","V","VI"]} selected={accNq} onSelect={v=>{setAccNq(v);setAccMod(0);}} labels={NQ_LABELS}/>
              <InlineDesc text={accNq?DESC.acc_nq[accNq]:null}/>
            </div>
          )}
          {accRow&&accImpact&&accMag&&(accMag!=="N"||accNq)&&(
            <div style={{marginTop:"16px",padding:"12px 14px",background:"#f0f4f8",borderRadius:"8px"}}>
              <p style={{fontSize:"14px",color:"#888",marginBottom:"10px"}}>Cell values [lower / mid / upper]: <strong>{accCell?accCell.join(" / "):"–"}</strong></p>
              <ModifierBtns value={accMod} onChange={setAccMod}/>
              <p style={{fontSize:"17px",fontWeight:"700",color:"#5DC1F2",marginTop:"10px"}}>Accountability points: {accPts}</p>
            </div>
          )}
          <Nav idx={4}/>
        </div>
      )}

      {step===5&&(
        <div>
          <div style={{borderRadius:"14px",marginBottom:"1rem",padding:"1.5rem",background:"linear-gradient(135deg,#0d3b3e 0%,#14555a 100%)"}}>
            <p style={{fontSize:"15px",color:"#a9dde2",marginBottom:"4px"}}>EVALUATION SUMMARY</p>
            <p style={{fontSize:"20px",fontWeight:"700",color:"#fff",marginBottom:"14px"}}>{jobTitle||"Untitled job"}</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"10px",marginBottom:"14px"}}>
              <ScoreBox label="Know-How" value={khPts}/>
              <ScoreBox label="Problem Solving" value={psPts}/>
              <ScoreBox label="Accountability" value={accPts}/>
              <ScoreBox label="Total Points" value={total}/>
            </div>
            {shortProfile&&<div style={{display:"inline-block",fontSize:"15px",color:"#0d3b3e",background:"#5DC1F2",padding:"4px 14px",borderRadius:"20px",fontWeight:"600"}}>Short profile: {shortProfile}</div>}
          </div>
          {hrl&&(
            <div style={card}>
              <p style={hdr}>Hay Reference Level (HRL) Recommendation</p>
              <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"14px"}}>
                <div style={{width:"64px",height:"64px",borderRadius:"50%",background:"#5DC1F2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",fontWeight:"800",color:"#0d3b3e",flexShrink:0}}>{hrl.hrl}</div>
                <div>
                  <div style={{fontSize:"19px",fontWeight:"700",color:"#1a1a2e"}}>HRL {hrl.hrl}</div>
                  <div style={{fontSize:"15px",color:"#555"}}>Total points {total} falls within this level's range</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}}>
                <ScoreBox label="Range Min" value={hrl.min}/>
                <ScoreBox label="Range Mid" value={hrl.mid}/>
                <ScoreBox label="Range Max" value={hrl.max}/>
              </div>
              <p style={{fontSize:"14px",color:"#888",marginTop:"12px",lineHeight:"1.6"}}>Based on the organisation's HRL grading table (Total Points Range, anchored to Know-How step {hrl.khStep}). If the total falls between two listed bands, the nearest level is shown.</p>
            </div>
          )}
          <div style={card}>
            <p style={hdr}>Evaluation Line (Standard Hay Notation)</p>
            <code style={{fontSize:"16px",color:"#1a1a2e",background:"#f0f4f8",padding:"10px 14px",borderRadius:"6px",display:"block",letterSpacing:"0.5px",lineHeight:"1.8"}}>
              KH: {khRow}{khCol}{khMod===1?"+":(khMod===-1?"-":"")}{khComm} = {khPts}<br/>
              PS: {psRow}{psMod===1?"+":""}{psCol} ({psPct}% × {khPts}) = {psPts}<br/>
              ACC: {accRow}{accImpact}{accMag!=="N"?accMag:`N(${accNq})`}{accMod===1?"+":(accMod===-1?"-":"")} = {accPts}<br/>
              <strong>Total = {total}  |  Short profile = {shortProfile}</strong>
            </code>
          </div>
          <div style={{display:"flex",gap:"10px",marginTop:"4px",flexWrap:"wrap"}}>
            <Btn label="Reset — new job" onClick={resetAll} large/>
            <Btn label="Revise scores ↗" active onClick={()=>setStep(2)} large/>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
